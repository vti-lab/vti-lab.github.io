<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes cluster architecture</title>
  <desc id="desc">Request flow from kubectl through the API server to cluster state, controllers, scheduler, and worker nodes.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#102e5b"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".3"/></filter><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#67e8f9"/></marker></defs>
  <rect width="1200" height="650" rx="36" fill="url(#bg)"/>
  <g fill="none" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)" opacity=".9"><path d="M205 325h120"/><path d="M495 325h100"/><path d="M755 270l100-105"/><path d="M755 325h100"/><path d="M755 380l100 105"/></g>
  <g font-family="Inter,Arial,sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g><rect x="55" y="250" width="150" height="150" rx="28" fill="#173c6b" stroke="#67e8f9" stroke-width="3"/><path d="M96 304h68M96 327h52M96 350h64" stroke="#fff" stroke-width="8" stroke-linecap="round"/><text x="130" y="385" fill="#fff" font-size="22" font-weight="700">kubectl</text></g>
    <g><rect x="325" y="215" width="170" height="220" rx="30" fill="#326ce5"/><circle cx="410" cy="287" r="38" fill="#fff" opacity=".16"/><path d="M384 287h52M410 261v52" stroke="#fff" stroke-width="9" stroke-linecap="round"/><text x="410" y="368" fill="#fff" font-size="24" font-weight="750">API Server</text><text x="410" y="397" fill="#dbeafe" font-size="16">auth · admission · API</text></g>
    <g><rect x="595" y="235" width="160" height="180" rx="28" fill="#12345c" stroke="#8b5cf6" stroke-width="3"/><ellipse cx="675" cy="290" rx="42" ry="18" fill="#8b5cf6"/><path d="M633 290v38c0 10 19 18 42 18s42-8 42-18v-38" fill="#8b5cf6" opacity=".75"/><text x="675" y="384" fill="#fff" font-size="24" font-weight="750">etcd</text></g>
    <g><rect x="855" y="70" width="280" height="155" rx="28" fill="#173c6b" stroke="#60a5fa" stroke-width="3"/><text x="995" y="126" fill="#fff" font-size="24" font-weight="750">Controllers</text><text x="995" y="160" fill="#bfdbfe" font-size="18">observe → reconcile</text><text x="995" y="191" fill="#bfdbfe" font-size="16">desired state</text></g>
    <g><rect x="855" y="248" width="280" height="155" rx="28" fill="#173c6b" stroke="#fbbf24" stroke-width="3"/><text x="995" y="304" fill="#fff" font-size="24" font-weight="750">Scheduler</text><text x="995" y="338" fill="#fef3c7" font-size="18">filter → score → bind</text><text x="995" y="369" fill="#fef3c7" font-size="16">Pod placement</text></g>
    <g><rect x="855" y="426" width="280" height="155" rx="28" fill="#173c6b" stroke="#34d399" stroke-width="3"/><text x="995" y="482" fill="#fff" font-size="24" font-weight="750">Worker Nodes</text><text x="995" y="516" fill="#d1fae5" font-size="18">kubelet · runtime · CNI</text><text x="995" y="547" fill="#d1fae5" font-size="16">observed state</text></g>
  </g>
  <text x="58" y="64" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">Cluster Architecture</text><text x="58" y="98" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="18">Declare → store → reconcile → observe</text>
</svg>
