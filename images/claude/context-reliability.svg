<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Context reliability and provenance</title><desc id="desc">Raw sources become a compact working context, decisions, and claims whose provenance and uncertainty remain visible to a human reviewer.</desc><defs><linearGradient id="b" x2="1" y2="1"><stop stop-color="#101b25"/><stop offset="1" stop-color="#24172b"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6z" fill="#7dd3fc"/></marker></defs><rect width="1200" height="600" rx="34" fill="url(#b)"/><text x="60" y="65" fill="#fff" font-family="Inter,Arial" font-size="30" font-weight="700">Reliable synthesis keeps the evidence attached</text><text x="60" y="100" fill="#a9b7c8" font-family="Inter,Arial" font-size="18">Compress context without erasing constraints, conflicts, or uncertainty.</text><g fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#a)"><path d="M250 300H410"/><path d="M610 300H760"/><path d="M940 300H1080"/></g><g font-family="Inter,Arial" text-anchor="middle"><g fill="#202c38" stroke="#7dd3fc" stroke-width="2"><rect x="55" y="205" width="195" height="190" rx="26"/><rect x="410" y="205" width="200" height="190" rx="26"/><rect x="760" y="205" width="180" height="190" rx="26"/></g><rect x="1060" y="205" width="110" height="190" rx="26" fill="#35243a" stroke="#f59e72" stroke-width="3"/><g fill="#fff" font-size="22" font-weight="700"><text x="152" y="270">Sources</text><text x="510" y="270">Working state</text><text x="850" y="270">Claims</text><text x="1115" y="270">Human</text></g><g fill="#a9b7c8" font-size="16"><text x="152" y="310">ID · time · owner</text><text x="510" y="310">rules · decisions</text><text x="850" y="310">evidence · confidence</text><text x="1115" y="310">review</text></g><g fill="#fbbf9f" font-size="15"><text x="152" y="347">conflicts retained</text><text x="510" y="347">summary with links</text><text x="850" y="347">unknown ≠ false</text><text x="1115" y="347">approve</text></g></g><path d="M850 395Q620 535 510 395" fill="none" stroke="#f59e72" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#a)"/><text x="680" y="500" fill="#fbbf9f" font-family="Inter,Arial" font-size="18" text-anchor="middle">FEEDBACK UPDATES STATE — NOT HISTORY</text></svg>
