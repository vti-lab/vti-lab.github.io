<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Agentic orchestration loop</title><desc id="desc">A coordinator delegates to specialist agents and evaluates their evidence in a bounded loop.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#171321"/><stop offset="1" stop-color="#23172b"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".32"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6z" fill="#f59e72"/></marker></defs>
  <rect width="1200" height="600" rx="34" fill="url(#bg)"/><g fill="none" stroke="#f59e72" stroke-width="4" marker-end="url(#arrow)" opacity=".9"><path d="M200 300H410"/><path d="M610 260L790 150"/><path d="M610 300H790"/><path d="M610 340L790 450"/><path d="M980 150Q1080 300 980 450"/><path d="M790 450Q680 540 500 420"/></g>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif" text-anchor="middle"><g><rect x="55" y="235" width="145" height="130" rx="24" fill="#272132" stroke="#7dd3fc"/><text x="127" y="292" fill="#fff" font-size="24" font-weight="700">Goal</text><text x="127" y="325" fill="#aeb8c7" font-size="17">constraints</text></g><g><rect x="410" y="195" width="200" height="210" rx="28" fill="#35243a" stroke="#f59e72" stroke-width="3"/><text x="510" y="270" fill="#fff" font-size="25" font-weight="700">Coordinator</text><text x="510" y="308" fill="#fbbf9f" font-size="18">plan · route</text><text x="510" y="340" fill="#fbbf9f" font-size="18">evaluate · stop</text></g><g fill="#222b38" stroke="#7dd3fc"><rect x="790" y="85" width="190" height="125" rx="24"/><rect x="790" y="238" width="190" height="125" rx="24"/><rect x="790" y="390" width="190" height="125" rx="24"/></g><g fill="#fff" font-size="22" font-weight="700"><text x="885" y="142">Researcher</text><text x="885" y="295">Analyst</text><text x="885" y="447">Reviewer</text></g><g fill="#aeb8c7" font-size="16"><text x="885" y="175">evidence</text><text x="885" y="328">structured result</text><text x="885" y="480">confidence</text></g></g>
  <text x="60" y="65" fill="#fff" font-family="Inter,Arial" font-size="30" font-weight="700">Bounded agentic loop</text><text x="60" y="100" fill="#aeb8c7" font-family="Inter,Arial" font-size="18">Delegate narrowly. Return evidence. Stop on explicit criteria.</text>
</svg>
