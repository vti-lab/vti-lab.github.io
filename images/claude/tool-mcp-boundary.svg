<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Tool and MCP trust boundary</title><desc id="desc">Claude uses a typed tool contract through an MCP client to reach a server while policy, validation, and audit guard the boundary.</desc><defs><linearGradient id="b" x2="1" y2="1"><stop stop-color="#101923"/><stop offset="1" stop-color="#1f1728"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6z" fill="#78d6ef"/></marker></defs><rect width="1200" height="600" rx="34" fill="url(#b)"/><text x="60" y="65" fill="#fff" font-family="Inter,Arial" font-size="30" font-weight="700">MCP is a contract across a trust boundary</text><text x="60" y="100" fill="#a9b7c8" font-family="Inter,Arial" font-size="18">Clear schemas and structured errors let the model recover safely.</text><g fill="none" stroke="#78d6ef" stroke-width="4" marker-end="url(#a)"><path d="M230 305H420"/><path d="M615 305H780"/><path d="M950 305H1090"/></g><g font-family="Inter,Arial" text-anchor="middle"><g fill="#1d2b38" stroke="#78d6ef" stroke-width="2"><rect x="70" y="220" width="160" height="170" rx="28"/><rect x="420" y="220" width="195" height="170" rx="28"/><rect x="780" y="220" width="170" height="170" rx="28"/><rect x="1020" y="220" width="130" height="170" rx="28"/></g><g fill="#fff" font-size="23" font-weight="700"><text x="150" y="290">Claude</text><text x="517" y="290">MCP client</text><text x="865" y="290">MCP server</text><text x="1085" y="290">System</text></g><g fill="#a9b7c8" font-size="16"><text x="150" y="330">selects tool</text><text x="517" y="330">validates schema</text><text x="865" y="330">enforces policy</text><text x="1085" y="330">side effect</text></g></g><rect x="350" y="150" width="675" height="310" rx="38" fill="none" stroke="#f59e72" stroke-width="3" stroke-dasharray="12 10"/><text x="688" y="488" fill="#fbbf9f" font-family="Inter,Arial" font-size="18" text-anchor="middle">AUTH · LEAST PRIVILEGE · AUDIT · ERROR CODES</text></svg>
