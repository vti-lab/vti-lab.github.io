<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Claude Code configuration scope</title><desc id="desc">Repository rules become more specific from organization to project and folder, then feed a plan, change, and verification workflow.</desc><defs><linearGradient id="b" x2="1" y2="1"><stop stop-color="#15131e"/><stop offset="1" stop-color="#172638"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6z" fill="#f59e72"/></marker></defs><rect width="1200" height="600" rx="34" fill="url(#b)"/><text x="60" y="65" fill="#fff" font-family="Inter,Arial" font-size="30" font-weight="700">Context follows scope; execution follows evidence</text><text x="60" y="100" fill="#a9b7c8" font-family="Inter,Arial" font-size="18">Load the closest relevant conventions, then plan, change, and verify.</text><g font-family="Inter,Arial"><rect x="70" y="155" width="460" height="340" rx="30" fill="#211d2c" stroke="#8bd9ef"/><rect x="115" y="205" width="370" height="240" rx="25" fill="#282337" stroke="#b99bf1"/><rect x="165" y="255" width="270" height="140" rx="20" fill="#35243a" stroke="#f59e72" stroke-width="3"/><text x="300" y="185" text-anchor="middle" fill="#8bd9ef" font-size="20">Organization rules</text><text x="300" y="235" text-anchor="middle" fill="#c9b7ef" font-size="20">Project CLAUDE.md</text><text x="300" y="318" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Path-specific rule</text><text x="300" y="353" text-anchor="middle" fill="#fbbf9f" font-size="17">closest scope wins</text><g fill="none" stroke="#f59e72" stroke-width="4" marker-end="url(#a)"><path d="M530 325H650"/><path d="M790 325H900"/><path d="M1030 325H1120"/></g><g fill="#1f2d39" stroke="#8bd9ef"><rect x="650" y="260" width="140" height="130" rx="24"/><rect x="900" y="260" width="130" height="130" rx="24"/><rect x="1080" y="260" width="95" height="130" rx="24"/></g><g fill="#fff" font-size="21" font-weight="700" text-anchor="middle"><text x="720" y="320">Plan</text><text x="965" y="320">Edit</text><text x="1128" y="320">Test</text></g><g fill="#a9b7c8" font-size="15" text-anchor="middle"><text x="720" y="350">risk-aware</text><text x="965" y="350">small scope</text><text x="1128" y="350">evidence</text></g></g></svg>
