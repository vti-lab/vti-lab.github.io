<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Prompt and validation loop</title><desc id="desc">Explicit criteria and examples feed Claude, whose structured output is validated and receives targeted feedback within a retry budget.</desc><defs><linearGradient id="b" x2="1" y2="1"><stop stop-color="#171321"/><stop offset="1" stop-color="#202839"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6z" fill="#f59e72"/></marker></defs><rect width="1200" height="600" rx="34" fill="url(#b)"/><text x="60" y="65" fill="#fff" font-family="Inter,Arial" font-size="30" font-weight="700">Precision comes from a closed feedback loop</text><text x="60" y="100" fill="#a9b7c8" font-family="Inter,Arial" font-size="18">Criteria define success. Schemas constrain shape. Validators create useful retries.</text><g fill="none" stroke="#f59e72" stroke-width="4" marker-end="url(#a)"><path d="M240 300H390"/><path d="M570 300H730"/><path d="M910 300H1050"/><path d="M820 385Q600 530 470 390"/></g><g font-family="Inter,Arial" text-anchor="middle"><g fill="#252231" stroke="#87d8ed" stroke-width="2"><rect x="60" y="220" width="180" height="160" rx="26"/><rect x="390" y="220" width="180" height="160" rx="26"/><rect x="730" y="220" width="180" height="160" rx="26"/><rect x="1010" y="220" width="140" height="160" rx="26"/></g><g fill="#fff" font-size="22" font-weight="700"><text x="150" y="285">Criteria</text><text x="480" y="285">Claude</text><text x="820" y="285">Validator</text><text x="1080" y="285">Accept</text></g><g fill="#a9b7c8" font-size="16"><text x="150" y="325">examples · schema</text><text x="480" y="325">structured result</text><text x="820" y="325">syntax · meaning</text><text x="1080" y="325">evidence</text></g></g><rect x="390" y="455" width="420" height="64" rx="20" fill="#35243a" stroke="#f59e72"/><text x="600" y="495" text-anchor="middle" fill="#fbbf9f" font-family="Inter,Arial" font-size="18">TARGETED FEEDBACK · RETRY BUDGET</text></svg>
